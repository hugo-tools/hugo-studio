<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feOffset in="blur" dy="8"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Rounded square background with subtle gradient -->
  <rect width="1024" height="1024" rx="200" ry="200" fill="url(#bg)"/>

  <!-- Inner shape: stylised "H" -->
  <g filter="url(#softShadow)">
    <rect x="270" y="240" width="120" height="544" rx="28" fill="#f8fafc"/>
    <rect x="634" y="240" width="120" height="544" rx="28" fill="#f8fafc"/>
    <rect x="370" y="452" width="284" height="120" rx="28" fill="#f8fafc"/>
  </g>

  <!-- Accent dot (cursor / marker) top-right -->
  <circle cx="800" cy="280" r="76" fill="url(#accent)"/>
  <circle cx="800" cy="280" r="76" fill="none" stroke="#1e293b" stroke-width="6" opacity="0.4"/>
</svg>
