name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag name to publish (es. v0.1.0). Senza il tag il workflow gira ma non pubblica."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-arm64
            os: macos-14
            rust-target: aarch64-apple-darwin
            tauri-args: "--target aarch64-apple-darwin"
          - platform: macos-x64
            os: macos-13
            rust-target: x86_64-apple-darwin
            tauri-args: "--target x86_64-apple-darwin"
          - platform: linux-x64
            os: ubuntu-22.04
            rust-target: x86_64-unknown-linux-gnu
            tauri-args: ""
          - platform: windows-x64
            os: windows-2022
            rust-target: x86_64-pc-windows-msvc
            tauri-args: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev \
            libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libxdo-dev \
            build-essential pkg-config

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install npm deps
        run: npm ci

      - name: Resolve tag for release
        id: tag
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "publish=true" >> "$GITHUB_OUTPUT"
          elif [[ -n "${{ github.event.inputs.tag }}" ]]; then
            echo "name=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
            echo "publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "name=manual-${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
            echo "publish=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build & publish (tauri-action)
        if: steps.tag.outputs.publish == 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Ad-hoc codesign for macOS so the bundle ships with a (self-signed)
          # signature instead of nothing — drops the "is damaged" Gatekeeper
          # error down to "unidentified developer" which the user can bypass
          # via right-click → Open. Real notarization needs a paid Apple Dev ID.
          APPLE_SIGNING_IDENTITY: ${{ startsWith(matrix.os, 'macos') && '-' || '' }}
        with:
          tagName: ${{ steps.tag.outputs.name }}
          releaseName: "Hugo Studio ${{ steps.tag.outputs.name }}"
          releaseBody: |
            Build automatica.

            **Asset prodotti**
            - macOS: `.dmg` (arm64 e x64) — *ad-hoc signed, non notarizzato*
            - Linux: AppImage e `.deb`
            - Windows: NSIS `.exe`

            **macOS — primo avvio**
            Il binario non è notarizzato (serve un Apple Developer ID a pagamento).
            Al primo lancio macOS dirà *"impossibile aprire perché Apple non può
            verificarlo"*. Due strade:
            1. Tasto destro sull'app → `Apri` → conferma nel dialog.
            2. Da Terminale, dopo aver copiato l'app in `/Applications`:
               ```
               xattr -dr com.apple.quarantine "/Applications/Hugo Studio.app"
               ```

            Cambiamenti: vedi commit fra il tag precedente e questo.
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: false
          args: ${{ matrix.tauri-args }}

      - name: Build only (no tag — smoke test)
        if: steps.tag.outputs.publish != 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          APPLE_SIGNING_IDENTITY: ${{ startsWith(matrix.os, 'macos') && '-' || '' }}
        with:
          args: ${{ matrix.tauri-args }}

      - name: Upload artifacts (no-tag run)
        if: steps.tag.outputs.publish != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: hugo-studio-${{ matrix.platform }}
          path: |
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/**/*
            src-tauri/target/release/bundle/**/*
          if-no-files-found: warn
          retention-days: 14
